# Minimal Frappe bench nginx stub — restores broken symlink so nginx can start.
# Full desk config: cd ~/frappe-bench && bench setup nginx

upstream frappe-bench-frappe {
    server 127.0.0.1:8000 fail_timeout=0;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name supermarket.local _;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Frappe-Site-Name supermarket.local;
        proxy_read_timeout 120;
        proxy_pass http://frappe-bench-frappe;
    }
}
