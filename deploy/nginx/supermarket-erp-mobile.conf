# LAN mobile testing — SPA + ERPNext API on one origin.
# Phone URL: http://<LAN_IP>:8888
# Install: sudo ./deploy/setup-mobile-nginx.sh

upstream supermarket_erpnext {
    server 127.0.0.1:8000;
    keepalive 8;
}

server {
    listen 8888;
    listen [::]:8888;
    server_name _;

    root /home/youssef/supermarket-erp/dist;
    index index.html;

    client_max_body_size 50m;

    # ERPNext REST + desk assets (same-origin for phone cookies)
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host supermarket.local;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Frappe-Site-Name supermarket.local;
        proxy_read_timeout 120;
        proxy_pass http://supermarket_erpnext;
    }

    location /assets/ {
        proxy_http_version 1.1;
        proxy_set_header Host supermarket.local;
        proxy_pass http://supermarket_erpnext;
    }

    location /files/ {
        proxy_http_version 1.1;
        proxy_set_header Host supermarket.local;
        proxy_pass http://supermarket_erpnext;
    }

    location /private/ {
        proxy_http_version 1.1;
        proxy_set_header Host supermarket.local;
        proxy_pass http://supermarket_erpnext;
    }

    # React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
